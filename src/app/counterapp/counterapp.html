<div class = "counter-container">
    <h2>Counter App</h2>
    <h2 [style.color]="color">
        {{ count() }}
    </h2>
    <div class="button-group">
<button class="btn"(click)="increment()"> + </button>
<button class = "btn reset-btn"(click)="reset()">Reset</button>
<button class="btn" (click)="decrement()"> - </button>
    </div>

</div>
